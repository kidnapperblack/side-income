<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Side Income Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.hero{
padding:60px 20px;
animation:fadein 2s;
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

.poster{
margin-top:30px;
}

.poster img{
width:100%;
max-width:500px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.benefits{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:50px;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
transition:0.4s;
}

.card:hover{
transform:translateY(-8px);
background:#1f2937;
}

.form-box{
margin-top:60px;
background:white;
color:black;
padding:30px;
border-radius:10px;
max-width:400px;
margin-left:auto;
margin-right:auto;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
background:#22c55e;
color:white;
font-size:18px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#16a34a;
}

.counter{
margin-top:20px;
color:#facc15;
font-weight:bold;
}

footer{
margin-top:80px;
padding:20px;
background:#020617;
text-align:center;
font-size:14px;
opacity:0.8;
}

@keyframes fadein{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>ऑनलाइन साइड इनकम शुरू करने का मौका</h1>

<p>मोबाइल से पार्ट टाइम इनकम के बारे में जानकारी पाने के लिए रजिस्टर करें</p>

<div class="poster">

<img src="poster.jpg">

</div>

<div class="counter">
⚡ केवल 50 लोगों के लिए ही रजिस्ट्रेशन खुला है
</div>

</div>

<div class="benefits">

<div class="card">
📱 मोबाइल से काम
</div>

<div class="card">
⏰ पार्ट टाइम इनकम
</div>

<div class="card">
🎓 ट्रेनिंग सपोर्ट
</div>

<div class="card">
🚀 आसान शुरुआत
</div>

</div>

<div class="form-box">

<h2>रजिस्ट्रेशन फॉर्म</h2>

<input type="text" placeholder="आपका नाम">

<input type="tel" placeholder="मोबाइल नंबर">

<input type="text" placeholder="आपका शहर">

<button>रजिस्ट्रेशन करें</button>

</div>

</div>

<footer>

© 2026 Online Income System

</footer>

</body>

</html>
